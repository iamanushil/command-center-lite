<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Catppuccin Mocha colors -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cba6f7"/>
      <stop offset="100%" style="stop-color:#f5c2e7"/>
    </linearGradient>
    <linearGradient id="earGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c2e7"/>
      <stop offset="100%" style="stop-color:#cba6f7"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#1e1e2e"/>
  
  <!-- Left ear -->
  <path d="M120 180 L80 60 L180 130 Z" fill="url(#earGradient)"/>
  <!-- Left ear inner -->
  <path d="M125 165 L100 85 L165 135 Z" fill="#f38ba8"/>
  
  <!-- Right ear -->
  <path d="M392 180 L432 60 L332 130 Z" fill="url(#earGradient)"/>
  <!-- Right ear inner -->
  <path d="M387 165 L412 85 L347 135 Z" fill="#f38ba8"/>
  
  <!-- Cat face -->
  <ellipse cx="256" cy="290" rx="175" ry="155" fill="url(#bgGradient)"/>
  
  <!-- Left eye -->
  <ellipse cx="185" cy="270" rx="35" ry="42" fill="#1e1e2e"/>
  <ellipse cx="192" cy="265" rx="15" ry="18" fill="#94e2d5"/>
  <circle cx="195" cy="260" r="6" fill="#cdd6f4"/>
  
  <!-- Right eye -->
  <ellipse cx="327" cy="270" rx="35" ry="42" fill="#1e1e2e"/>
  <ellipse cx="320" cy="265" rx="15" ry="18" fill="#94e2d5"/>
  <circle cx="317" cy="260" r="6" fill="#cdd6f4"/>
  
  <!-- Nose -->
  <path d="M256 320 L243 345 L269 345 Z" fill="#f38ba8"/>
  
  <!-- Mouth -->
  <path d="M256 345 Q256 365 238 375" fill="none" stroke="#1e1e2e" stroke-width="4" stroke-linecap="round"/>
  <path d="M256 345 Q256 365 274 375" fill="none" stroke="#1e1e2e" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Whiskers left -->
  <line x1="90" y1="310" x2="160" y2="320" stroke="#1e1e2e" stroke-width="3" stroke-linecap="round"/>
  <line x1="85" y1="340" x2="158" y2="345" stroke="#1e1e2e" stroke-width="3" stroke-linecap="round"/>
  <line x1="90" y1="370" x2="160" y2="365" stroke="#1e1e2e" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Whiskers right -->
  <line x1="422" y1="310" x2="352" y2="320" stroke="#1e1e2e" stroke-width="3" stroke-linecap="round"/>
  <line x1="427" y1="340" x2="354" y2="345" stroke="#1e1e2e" stroke-width="3" stroke-linecap="round"/>
  <line x1="422" y1="370" x2="352" y2="365" stroke="#1e1e2e" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Cheek blush left -->
  <ellipse cx="145" cy="340" rx="25" ry="15" fill="#f38ba8" opacity="0.4"/>
  
  <!-- Cheek blush right -->
  <ellipse cx="367" cy="340" rx="25" ry="15" fill="#f38ba8" opacity="0.4"/>
</svg>
